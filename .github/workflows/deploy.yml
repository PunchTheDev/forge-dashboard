name: Deploy to ventura-nanoclaw

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skips silently when SERVER_SSH_KEY is not set.
    if: ${{ secrets.SERVER_SSH_KEY != '' }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Build
        run: npm ci && npm run build

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ vars.SERVER_HOST || '143.244.191.193' }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy dist to server
        env:
          SERVER: ${{ vars.SERVER_USER || 'root' }}@${{ vars.SERVER_HOST || '143.244.191.193' }}
          DASH_DIR: ${{ vars.SERVER_FORGE_DASH_DIR || '/root/forge-dashboard' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SERVER" \
            "mkdir -p '$DASH_DIR/dist'"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ "$SERVER:$DASH_DIR/dist/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SERVER" \
            "pm2 restart forge-dashboard || (pm2 serve '$DASH_DIR/dist' 8080 --name forge-dashboard --spa && pm2 save)"
