name: Deploy to ventura-nanoclaw

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check SSH key configured
        id: check
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "SERVER_SSH_KEY not set — skipping deploy."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.check.outputs.has_key == 'true'

      - uses: actions/setup-node@v5
        if: steps.check.outputs.has_key == 'true'
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Build
        if: steps.check.outputs.has_key == 'true'
        run: npm ci && npm run build

      - name: Set up SSH
        if: steps.check.outputs.has_key == 'true'
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ vars.SERVER_HOST || '143.244.191.193' }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy dist + server to host
        if: steps.check.outputs.has_key == 'true'
        env:
          SERVER: ${{ vars.SERVER_USER || 'root' }}@${{ vars.SERVER_HOST || '143.244.191.193' }}
          DASH_DIR: ${{ vars.SERVER_FORGE_DASH_DIR || '/root/forge-dashboard' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SERVER" \
            "mkdir -p '$DASH_DIR/dist'"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ "$SERVER:$DASH_DIR/dist/"
          rsync -az -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            server.cjs "$SERVER:$DASH_DIR/server.cjs"
          # Replace any prior `pm2 serve` unit with the new compressed Node
          # server. `pm2 delete` is idempotent; the new `pm2 start` boots fresh.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SERVER" \
            "cd '$DASH_DIR' && pm2 delete forge-dashboard 2>/dev/null; pm2 start server.cjs --name forge-dashboard --update-env && pm2 save"
